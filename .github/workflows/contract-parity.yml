name: Contract Parity (BrandOS <-> IntelligenceOS)

# Cognitive Platform Evolution Program — EM-1.1 (Contract Publishing &
# Parity Gate). Fails the build if @platform/cognition-contract has
# drifted between this repository and BrandOS in an undocumented way. See
# packages/cognition-contract/scripts/check-contract-parity.mjs for what
# counts as "documented" (contract-parity.allowlist.json).
#
# NOTE: wired to the real sibling repository, SaurabhT2/BOS (2026-07-22,
# initial architecture review follow-up — the placeholder <ORG>/brandos
# this workflow shipped with was never a real slug; this repository's own
# project instructions name SaurabhT2/BOS as the companion repository).
# This still requires a `BRANDOS_REPO_READ_TOKEN` repository secret — a
# fine-grained PAT with read-only access to SaurabhT2/BOS — which has NOT
# been provisioned as of this commit (verified: the "Checkout BrandOS"
# step fails with "Input required and not supplied: token" until it is).
# Provisioning it requires "Secrets: write" permission on this repository,
# which is an infrastructure/credentials step a repository admin needs to
# do directly (Settings -> Secrets and variables -> Actions -> New
# repository secret), not something available from this workflow's own
# permissions. See docs/handoffs/ for the session that made this change.

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - 'packages/cognition-contract/**'

jobs:
  parity:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout IntelligenceOS
        uses: actions/checkout@v4
        with:
          path: intelligence-os

      - name: Checkout BrandOS
        uses: actions/checkout@v4
        with:
          repository: SaurabhT2/BOS
          path: brandos
          token: ${{ secrets.BRANDOS_REPO_READ_TOKEN }}

      - name: Enable corepack (pnpm)
        run: corepack enable

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install IntelligenceOS's cognition-contract deps
        working-directory: intelligence-os/packages/cognition-contract
        run: pnpm install --frozen-lockfile --filter @platform/cognition-contract... 2>/dev/null || pnpm install --frozen-lockfile

      - name: Run parity check
        working-directory: intelligence-os/packages/cognition-contract
        env:
          SIBLING_CONTRACT_SRC: ${{ github.workspace }}/brandos/packages/cognition-contract/src
        run: node scripts/check-contract-parity.mjs
